<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Acesse o ContHub para entrar no painel contábil da Franco RNC com segurança e gerenciar suas rotinas operacionais."
  />
  <title>ContHub • Login</title>
  <script src="../shared/theme-boot.js"></script>
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="/login/login.css" />
</head>

<body class="auth-screen">
  <main class="auth-shell">
    <form class="auth-card" id="loginForm" novalidate>
      <header class="auth-card__header">
        <span class="auth-card__eyebrow">ContHub</span>
        <h2>Entrar no ContHub</h2>
        <p class="muted">Preencha seus dados para continuar.</p>
      </header>

      <div class="field">
        <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="seuemail@empresa.com"
            autocomplete="email"
            required
          />
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <div class="password">
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Sua senha"
            autocomplete="current-password"
            required
          />
          <button
            class="eye"
            id="togglePassword"
            type="button"
            aria-label="Mostrar senha"
            aria-pressed="false"
          >
            👁
          </button>
        </div>
      </div>

      <button class="auth-submit" type="submit">Entrar</button>

      <div class="auth-links">
        <a href="/forgot/forgot.html">Esqueci minha senha</a>
        <a href="/signup/signup.html">Criar acesso</a>
      </div>

      <div id="err" class="message message--error hidden" role="alert"></div>
    </form>
  </main>

  <div class="login-loading" id="loginLoading">
    <div class="login-loading__card">
      <div class="spinner"></div>
      <p id="loginLoadingText">Entrando no ContHub...</p>
    </div>
  </div>

  <script src="/login/login.js"></script>
</body>
</html>

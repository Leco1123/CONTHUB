<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Acesse o ContHub para entrar no painel contábil da Franco RNC com segurança e gerenciar suas rotinas operacionais."
  />
  <title>ContHub • Login</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/login/login.css" />
</head>

<body class="login">
  <main class="wrap">
    <form class="card" id="loginForm" novalidate>
      <header class="card__header">
        <h1>ContHub</h1>
        <p class="muted">Acesse o painel com seu usuário:</p>
      </header>

      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          placeholder="admin@local"
          autocomplete="email"
          required
        />
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <div class="password">
          <input
            id="password"
            name="password"
            type="password"
            placeholder="admin123"
            autocomplete="current-password"
            required
          />
          <button
            class="eye"
            id="togglePassword"
            type="button"
            aria-label="Mostrar senha"
            aria-pressed="false"
          >
            👁
          </button>
        </div>
      </div>

      <button class="btn btn--primary w100" type="submit">
        Entrar
      </button>

      <p class="hint muted">
        <a href="/forgot/forgot.html">Esqueci minha senha</a>
        Não tem cadastro? <a href="/signup/signup.html">Cadastre-se</a>
      </p>

      <div id="err" class="err hidden" role="alert"></div>

    </form>
  </main>

  <!-- LOADING -->
  <div class="login-loading" id="loginLoading">
    <div class="login-loading__card">
      <div class="spinner"></div>
      <p id="loginLoadingText">Entrando no ContHub...</p>
    </div>
  </div>

  <!-- JS -->
  <script src="/login/login.js"></script>
</body>
</html>

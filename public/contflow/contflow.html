<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContFlow • ContHub</title>

    <!-- XLSX (import/export) -->
    <script src="/libs/xlsx.full.min.js"></script>

    <link rel="stylesheet" href="./contflow.css" />
  </head>

  <body>
    <div class="app" id="app">
      <div class="overlay" id="overlay" aria-hidden="true"></div>

      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar" aria-label="Menu lateral de módulos">
        <div class="sidebar__brand">
          <div class="brand__text">
            <div class="brand__name">ContHub</div>
          </div>
        </div>

        <div class="titulo-sidebar">MÓDULOS DO CONTHUB</div>

        <nav class="modulos-sidebar">
          <button
            class="cards-modulos"
            type="button"
            data-module-id="dashboard"
            data-title="Dashboard"
            data-src="../dashboard/dashboard.html"
            data-subtitle="Visão geral do ContHub."
          >
            <span class="icone-modulo">🏠</span>
            <span class="plaquinha-de-nome">
              <span class="placeholder-titulo">Dashboard</span>
              <span class="placeholder">Visão geral</span>
            </span>
            <span class="status" data-status="online">ONLINE</span>
          </button>

          <button
            class="cards-modulos is-active"
            type="button"
            data-module-id="contflow"
            data-title="ContFlow"
            data-src="../contflow/contflow.html"
            data-subtitle="Controle de rotinas e fluxo contábil."
          >
            <span class="icone-modulo">⚡</span>
            <span class="plaquinha-de-nome">
              <span class="placeholder-titulo">ContFlow</span>
              <span class="placeholder">Rotinas e fluxo</span>
            </span>
            <span class="status" data-status="online">ONLINE</span>
          </button>

          <button
            class="cards-modulos"
            type="button"
            data-module-id="contanalytics"
            data-title="ContAnalytics"
            data-src="../contanalytics/contanalytics.html"
            data-subtitle="KPIs, indicadores e painéis de análise."
          >
            <span class="icone-modulo">📊</span>
            <span class="plaquinha-de-nome">
              <span class="placeholder-titulo">ContAnalytics</span>
              <span class="placeholder">KPIs e painel</span>
            </span>
            <span class="status" data-status="online">ONLINE</span>
          </button>

          <button
            class="cards-modulos"
            type="button"
            data-module-id="contdocs"
            data-title="ContDocs"
            data-src="../contdocs/contdocs.html"
            data-subtitle="Centralização e gestão de documentos."
          >
            <span class="icone-modulo">📁</span>
            <span class="plaquinha-de-nome">
              <span class="placeholder-titulo">ContDocs</span>
              <span class="placeholder">Documentos</span>
            </span>
            <span class="status" data-status="online">ONLINE</span>
          </button>

          <button
            class="cards-modulos"
            type="button"
            data-module-id="contrels"
            data-title="ContRelatórios"
            data-src="../contrels/contrels.html"
            data-subtitle="Geração de relatórios e exportações."
          >
            <span class="icone-modulo">📈</span>
            <span class="plaquinha-de-nome">
              <span class="placeholder-titulo">ContRelatórios</span>
              <span class="placeholder">Exportações</span>
            </span>
            <span class="status" data-status="online">ONLINE</span>
          </button>

          <button
            class="cards-modulos"
            type="button"
            data-module-id="contconfig"
            data-title="ContConfig"
            data-src="../contconfig/contconfig.html"
            data-subtitle="Parâmetros e configurações gerais."
          >
            <span class="icone-modulo">⚙️</span>
            <span class="plaquinha-de-nome">
              <span class="placeholder-titulo">ContConfig</span>
              <span class="placeholder">Parâmetros</span>
            </span>
            <span class="status" data-status="online">ONLINE</span>
          </button>

          <button
            class="cards-modulos"
            type="button"
            data-module-id="contadmin"
            data-title="ContAdmin Hub"
            data-src="../contadmin/contadmin.html"
            data-subtitle="Área administrativa e de controle total."
          >
            <span class="icone-modulo">🛡️</span>
            <span class="plaquinha-de-nome">
              <span class="placeholder-titulo">ContAdmin Hub</span>
              <span class="placeholder">Acesso total</span>
            </span>
            <span class="status" data-status="admin">ADMIN</span>
          </button>
        </nav>

        <div class="sidebar__footer">
          <div class="usercard-wrap">
            <button
              class="cards-modulos usercard"
              type="button"
              data-usercard
              aria-label="Abrir perfil do usuário"
            >
              <span class="icone-modulo usercard__avatar" data-user-avatar>U</span>

              <span class="plaquinha-de-nome usercard__info">
                <span class="placeholder-titulo usercard__name" data-user-name>Usuário</span>
                <span class="placeholder usercard__role muted" data-user-role>USER</span>
              </span>
            </button>

            <button class="btn btn--sair" type="button" data-logout aria-label="Sair do ContHub">
              Sair
            </button>
          </div>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <header class="topbar">
          <button id="menuBtn" class="iconbtn" type="button" aria-label="Abrir menu">☰</button>

          <div class="topbar__title">
            <h1 id="pageTitle">ContFlow</h1>
            <p id="pageSubtitle" class="muted">Controle de rotinas e fluxo contábil.</p>
          </div>
        </header>

        <section class="cf-card">
          <header class="cf-header">
            <h2>ContFlow</h2>

            <div class="cf-actions">
              <button id="cf-save-cells" class="cf-btn" type="button">🧩 Salvar células</button>
              <button id="cf-base-btn" class="cf-btn" type="button">Base</button>
              <span id="cf-status-bar" class="muted">Linhas: 0 · Selecionadas: 0 x 0</span>
            </div>
          </header>

          <div class="cf-grid-container">
            <div class="table-wrapper">
              <table class="cf-table">
                <colgroup>
                  <col style="width: 40px" />
                  <col style="width: 70px" />
                  <col style="width: 240px" />
                  <col style="width: 150px" />
                  <col style="width: 160px" />
                  <col style="width: 140px" />
                  <col style="width: 140px" />
                  <col style="width: 80px" />
                  <col style="width: 110px" />
                  <col style="width: 110px" />
                  <col style="width: 110px" />
                  <col style="width: 110px" />
                  <col style="width: 220px" />
                  <col style="width: 120px" />
                  <col style="width: 220px" />
                </colgroup>

                <thead>
                  <tr>
                    <th id="cf-corner-select">#</th>
                    <th class="cf-col-header" data-col-index="0">Cód.</th>
                    <th class="cf-col-header" data-col-index="1">Razão Social</th>
                    <th class="cf-col-header" data-col-index="2">CNPJ/CPF</th>
                    <th class="cf-col-header" data-col-index="3">Trib.</th>
                    <th class="cf-col-header" data-col-index="4">Resp.1</th>
                    <th class="cf-col-header" data-col-index="5">Resp.2</th>
                    <th class="cf-col-header" data-col-index="6">Tipo</th>
                    <th class="cf-col-header" data-col-index="7">Num Quotas</th>
                    <th class="cf-col-header" data-col-index="8">1º quota</th>
                    <th class="cf-col-header" data-col-index="9">2º quota</th>
                    <th class="cf-col-header" data-col-index="10">3º quota</th>
                    <th class="cf-col-header" data-col-index="11">Obs</th>
                    <th class="cf-col-header" data-col-index="12">MIT</th>
                    <th class="cf-col-header" data-col-index="13">Controle de MIT</th>
                  </tr>
                </thead>

                <tbody id="cf-tbody">
                  <!-- linhas via JS -->
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- MODAL -->
    <div id="cf-modal-backdrop"></div>

    <div id="cf-modal" role="dialog" aria-modal="true" aria-label="Base ContFlow">
      <header>
        <strong>Base ContFlow</strong>
        <button id="cf-modal-close" class="cf-btn cf-btn--ghost" type="button">✕</button>
      </header>

      <div class="cf-modal-actions">
        <button id="cf-add-row" class="cf-btn" type="button">➕ Nova linha</button>

        <label class="cf-file">
          Importar CSV/XLS
          <input id="cf-import" type="file" accept=".csv,.xls,.xlsx" hidden />
        </label>

        <button id="cf-export" class="cf-btn" type="button">⬇ Exportar CSV</button>
        <button id="cf-export-xlsx" class="cf-btn" type="button">⬇ Exportar XLSX</button>

        <button id="cf-save-base" class="cf-btn" type="button">💾 Salvar base</button>

        <button id="cf-delete-selected" class="cf-btn cf-btn--danger" type="button">
          🗑 Excluir seleção
        </button>
      </div>
    </div>

    <script src="./contflow.js"></script>
  </body>
</html>

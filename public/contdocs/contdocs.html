<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContDocs - Em Desenvolvimento</title>
  <link rel="stylesheet" href="/public/contdocs/contdocs.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <main class="dev-page">
    <section class="dev-card">
      <div class="top-badge">EM DESENVOLVIMENTO</div>

      <div class="robot-wrap">
        <div class="robot" id="robot">
          <div class="robot-antenna"></div>
          <div class="robot-head">
            <span class="eye eye-left"></span>
            <span class="eye eye-right"></span>
            <span class="mouth"></span>
          </div>
          <div class="robot-body">
            <span class="bot-dot dot-1"></span>
            <span class="bot-dot dot-2"></span>
            <span class="bot-dot dot-3"></span>
          </div>
        </div>
      </div>

      <div class="panel-label">ContDocs</div>

      <h1 class="title">Módulo em construção</h1>

      <p class="subtitle">
        Estamos preparando esta área do painel para receber novas funcionalidades,
        melhorias visuais e recursos adicionais.
      </p>

      <p class="highlight-text">
        Mudanças e novidades em breve.
      </p>

      <div class="status-row">
        <div class="status-pill">
          <span class="status-dot"></span>
          Atualizações em andamento
        </div>

        <div class="mini-loader" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <button class="ghost-btn" type="button" id="notifyBtn">
        Acompanhar novidades
      </button>

      <p class="footer-note" id="footerMessage">
        Esta tela ainda não está disponível para uso.
      </p>
    </section>
  </main>

  <script src="/public/contdocs/contdocs.js"></script>
</body>
</html>
